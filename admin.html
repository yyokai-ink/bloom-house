<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Адмінка | Квітковий Дім</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--sage:#314f37;--berry:#8d465a;--muted:#7c7164;--line:rgba(49,79,55,.16);--milk:#fff4ea}
html,body{min-height:100%;font-family:Arial,sans-serif;background:linear-gradient(180deg,#fffdf8,#edf2e7);color:#2b261f;touch-action:manipulation;overflow-x:hidden}
button,input,select,textarea{font-family:inherit;font-size:16px}
button{border:0;cursor:pointer}
.page{width:min(1120px,calc(100% - 24px));margin:0 auto;padding:16px 0 60px}
.card{padding:20px;border-radius:28px;background:rgba(255,255,255,.92);border:1px solid #fff;box-shadow:0 16px 44px rgba(49,79,55,.08)}
.login{max-width:420px;margin:80px auto}
.hero{padding:28px;border-radius:34px;background:rgba(255,255,255,.84);border:1px solid #fff;box-shadow:0 20px 60px rgba(49,79,55,.12);text-align:center}
.hero h1{font-size:42px;color:var(--sage);letter-spacing:-.06em}
.hero p{margin-top:8px;color:var(--muted)}
h2{font-size:28px;color:var(--sage);margin-bottom:14px;letter-spacing:-.04em}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:18px 0}
.tab{min-height:52px;border-radius:999px;background:#fff;color:var(--sage);font-weight:950;border:1px solid var(--line)}
.tab.active{background:var(--sage);color:#fff}
.section{display:none}
.section.active{display:block}
.form{display:grid;gap:11px}
.field{display:grid;gap:6px}
label{font-size:13px;font-weight:950;color:var(--sage)}
input,select,textarea{width:100%;min-height:54px;border-radius:18px;border:1px solid var(--line);background:#fff;padding:0 14px;outline:none}
textarea{min-height:96px;padding-top:14px;resize:vertical}
.two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.btn{min-height:52px;border-radius:999px;padding:0 16px;font-weight:950;background:var(--sage);color:#fff}
.btn.red{background:var(--berry)}
.btn.light{background:#fff;color:var(--sage);border:1px solid var(--line)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.list{display:grid;gap:10px;margin-top:14px}
.item{padding:12px;border-radius:20px;background:#fff;border:1px solid var(--line)}
.product-row{display:grid;grid-template-columns:70px 1fr;gap:12px}
.product-row img{width:70px;height:70px;border-radius:16px;object-fit:cover;background:var(--milk)}
.item b{color:var(--sage);font-size:17px}
.item small{display:block;margin-top:5px;color:var(--muted);line-height:1.45}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.actions .btn{min-height:44px;font-size:14px}
.status{display:inline-block;margin-top:8px;padding:7px 10px;border-radius:999px;background:var(--milk);color:var(--berry);font-size:12px;font-weight:950}
.order-products{margin-top:10px;color:var(--muted);font-size:14px;line-height:1.55}
.preview{display:none;width:100%;max-height:220px;object-fit:cover;border-radius:20px;background:var(--milk);border:1px solid var(--line)}
.notice{margin-bottom:12px;padding:14px;border-radius:18px;background:var(--milk);color:var(--sage);font-weight:900;line-height:1.45}
.progress{display:none;margin-top:10px;padding:14px;border-radius:18px;background:#fff;color:var(--sage);border:1px solid var(--line);font-weight:900;text-align:center}
.hidden{display:none!important}
@media(max-width:720px){.hero h1{font-size:34px}.two{grid-template-columns:1fr}.product-row{grid-template-columns:64px 1fr}.product-row img{width:64px;height:64px}}
</style>
</head>

<body>
<div class="page">

<div class="card login" id="loginBox">
  <h2>Вхід в адмінку</h2>
  <div class="form">
    <input id="adminPass" type="password" placeholder="Пароль">
    <button class="btn" onclick="login()">Увійти</button>
  </div>
</div>

<div id="adminPanel" class="hidden">

<section class="hero">
  <h1>Квітковий Дім</h1>
  <p>Додати товар, змінити залишок, підтвердити замовлення.</p>
</section>

<div class="tabs">
  <button class="tab active" onclick="showTab('products',this)">Товари</button>
  <button class="tab" onclick="showTab('orders',this)">Замовлення</button>
</div>

<section id="productsTab" class="section active">
  <div class="card">
    <h2>Додати товар</h2>

    <div class="notice">
      Фото завантажується в Cloudinary, товар зберігається у Firebase і автоматично зʼявляється на сайті.
    </div>

    <div class="form">
      <div class="field">
        <label>Фото товару</label>
        <input id="productImageFile" type="file" accept="image/jpeg,image/png,image/jpg" onchange="previewImage()">
        <img id="imagePreview" class="preview">
      </div>

      <div class="two">
        <div class="field">
          <label>Категорія</label>
          <select id="productCategory">
            <option value="flowers">Квіти</option>
            <option value="berries">Ягоди</option>
            <option value="seedlings">Розсада</option>
          </select>
        </div>

        <div class="field">
          <label>Підкатегорія</label>
          <input id="productSubcategoryText" placeholder="Хризантеми / Малина / Овочева">
        </div>
      </div>

      <div class="field">
        <label>Назва / сорт</label>
        <input id="productTitle" placeholder="Наприклад: Попкорн">
      </div>

      <div class="two">
        <div class="field">
          <label>Ціна, грн</label>
          <input id="productPrice" type="number" placeholder="120">
        </div>

        <div class="field">
          <label>Кількість, шт</label>
          <input id="productStock" type="number" placeholder="25">
        </div>
      </div>

      <div class="two">
        <div class="field">
          <label>Тип</label>
          <input id="productType" placeholder="Мультифлора / Ремонтантна">
        </div>

        <div class="field">
          <label>Вік</label>
          <input id="productAge" placeholder="2-річна / 1-річна">
        </div>
      </div>

      <div class="field">
        <label>Опис</label>
        <textarea id="productDesc" placeholder="Короткий опис товару"></textarea>
      </div>

      <button class="btn" id="saveProductBtn" onclick="addProduct()">Зберегти товар</button>
      <div class="progress" id="progressBox">Готуємо...</div>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <h2>Список товарів</h2>
    <div class="list" id="productsList"></div>
  </div>
</section>

<section id="ordersTab" class="section">
  <div class="card">
    <h2>Замовлення</h2>
    <div class="list" id="ordersList"></div>
  </div>
</section>

</div>
</div>

<script>
const ADMIN_PASSWORD="admin123";

const CLOUD_NAME="doz2sacki";
const UPLOAD_PRESET="tsyvs3pz";

const firebaseConfig={
  apiKey:"AIzaSyALs-ZgFX7auGxRQ2EeQnVngjnejimPLV4",
  authDomain:"yyokai-tattoo-system.firebaseapp.com",
  databaseURL:"https://yyokai-tattoo-system-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId:"yyokai-tattoo-system",
  storageBucket:"yyokai-tattoo-system.firebasestorage.app",
  messagingSenderId:"995298614954",
  appId:"1:995298614954:web:e4039c69fcb0541a95fad3"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const categoriesRef=db.ref("gardenCategories");
const subcategoriesRef=db.ref("gardenSubcategories");
const productsRef=db.ref("gardenProducts");
const ordersRef=db.ref("gardenOrders");

let products={};
let orders={};
let subcategories={};

function login(){
  if(adminPass.value===ADMIN_PASSWORD){
    localStorage.setItem("admin_ok","yes");
    loginBox.classList.add("hidden");
    adminPanel.classList.remove("hidden");
    initAdmin();
  }else{
    alert("Невірний пароль");
  }
}

if(localStorage.getItem("admin_ok")==="yes"){
  loginBox.classList.add("hidden");
  adminPanel.classList.remove("hidden");
  initAdmin();
}

function showTab(id,btn){
  document.querySelectorAll(".tab").forEach(tab=>tab.classList.remove("active"));
  btn.classList.add("active");

  productsTab.classList.remove("active");
  ordersTab.classList.remove("active");

  if(id==="products")productsTab.classList.add("active");
  if(id==="orders")ordersTab.classList.add("active");
}

async function initAdmin(){
  await ensureBaseCategories();

  productsRef.on("value",snap=>{
    products=snap.val()||{};
    renderProducts();
  });

  ordersRef.on("value",snap=>{
    orders=snap.val()||{};
    renderOrders();
  });

  subcategoriesRef.on("value",snap=>{
    subcategories=snap.val()||{};
  });
}

async function ensureBaseCategories(){
  const snap=await categoriesRef.once("value");
  if(snap.exists())return;

  await categoriesRef.set({
    flowers:{id:"flowers",title:"Квіти",emoji:"🌸",sort:1,active:true},
    berries:{id:"berries",title:"Ягоди",emoji:"🍓",sort:2,active:true},
    seedlings:{id:"seedlings",title:"Розсада",emoji:"🌱",sort:3,active:true}
  });
}

function categoryTitle(id){
  if(id==="flowers")return "Квіти";
  if(id==="berries")return "Ягоди";
  if(id==="seedlings")return "Розсада";
  return id;
}

function makeId(text){
  return text.toLowerCase().trim()
    .replace(/[^\p{L}\p{N}]+/gu,"_")
    .replace(/^_+|_+$/g,"")+"_"+Date.now();
}

function previewImage(){
  const file=productImageFile.files[0];

  if(!file){
    imagePreview.style.display="none";
    return;
  }

  imagePreview.src=URL.createObjectURL(file);
  imagePreview.style.display="block";
}

function uploadImageToCloudinary(file){
  return new Promise((resolve,reject)=>{
    const formData=new FormData();
    formData.append("file",file);
    formData.append("upload_preset",UPLOAD_PRESET);

    const xhr=new XMLHttpRequest();

    xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`);

    const timeout=setTimeout(()=>{
      xhr.abort();
      reject(new Error("Фото довго завантажується. Спробуйте менше фото або Wi-Fi."));
    },30000);

    xhr.upload.onprogress=function(e){
      if(e.lengthComputable){
        const percent=Math.round((e.loaded/e.total)*100);
        progressBox.textContent="Завантажуємо фото: "+percent+"%";
      }
    };

    xhr.onload=function(){
      clearTimeout(timeout);

      try{
        const data=JSON.parse(xhr.responseText);

        if(xhr.status>=200 && xhr.status<300 && data.secure_url){
          resolve(data.secure_url);
        }else{
          reject(new Error(data.error?.message || "Cloudinary не прийняв фото"));
        }
      }catch(e){
        reject(new Error("Не вдалося прочитати відповідь Cloudinary"));
      }
    };

    xhr.onerror=function(){
      clearTimeout(timeout);
      reject(new Error("Помилка інтернету при завантаженні фото"));
    };

    xhr.send(formData);
  });
}

async function ensureSubcategory(category,title){
  const cleanTitle=title.trim();

  const existing=Object.values(subcategories).find(sub=>{
    return sub.category===category &&
    String(sub.title).toLowerCase()===cleanTitle.toLowerCase();
  });

  if(existing)return existing.id;

  const id=makeId(cleanTitle);

  await subcategoriesRef.child(id).set({
    id,
    category,
    title:cleanTitle,
    sort:Date.now(),
    active:true,
    createdAt:new Date().toISOString()
  });

  return id;
}

async function addProduct(){
  const category=productCategory.value;
  const subTitle=productSubcategoryText.value.trim();
  const title=productTitle.value.trim();
  const file=productImageFile.files[0];

  if(!file)return alert("Оберіть фото товару");
  if(!title)return alert("Введіть назву товару");
  if(!subTitle)return alert("Введіть підкатегорію");
  if(!productPrice.value)return alert("Введіть ціну");
  if(!productStock.value)return alert("Введіть кількість");

  saveProductBtn.disabled=true;
  saveProductBtn.textContent="Зберігаємо...";
  progressBox.style.display="block";
  progressBox.textContent="Починаємо завантаження...";

  try{
    const id=makeId(title);

    const imageUrl=await uploadImageToCloudinary(file);

    progressBox.textContent="Зберігаємо товар у Firebase...";

    const subcategoryId=await ensureSubcategory(category,subTitle);

    await productsRef.child(id).set({
      id,
      title,
      category,
      subcategory:subcategoryId,
      type:productType.value.trim(),
      age:productAge.value.trim(),
      price:Number(productPrice.value||0),
      stock:Number(productStock.value||0),
      unit:"шт",
      desc:productDesc.value.trim(),
      image:imageUrl,
      active:true,
      sort:Date.now(),
      createdAt:new Date().toISOString()
    });

    productTitle.value="";
    productSubcategoryText.value="";
    productPrice.value="";
    productStock.value="";
    productType.value="";
    productAge.value="";
    productDesc.value="";
    productImageFile.value="";
    imagePreview.src="";
    imagePreview.style.display="none";

    progressBox.textContent="Товар збережено ✅";
    alert("Товар збережено");
  }catch(error){
    console.error(error);
    alert("Помилка: "+error.message);
    progressBox.textContent="Помилка: "+error.message;
  }

  saveProductBtn.disabled=false;
  saveProductBtn.textContent="Зберегти товар";

  setTimeout(()=>{
    progressBox.style.display="none";
  },3000);
}

function renderProducts(){
  const arr=Object.values(products).sort((a,b)=>(b.sort||0)-(a.sort||0));

  if(!arr.length){
    productsList.innerHTML=`<div class="item">Поки що товарів немає</div>`;
    return;
  }

  productsList.innerHTML=arr.map(p=>`
    <div class="item product-row">
      <img src="${p.image||""}">
      <div>
        <b>${p.title}</b>
        <small>
          Категорія: ${categoryTitle(p.category)}<br>
          Ціна: ${p.price||0} грн<br>
          Залишок: ${p.stock||0} шт<br>
          ${p.active===false ? "Приховано" : "Показується"}
        </small>

        <div class="actions">
          <button class="btn light" onclick="changeStock('${p.id}',1)">+1 шт</button>
          <button class="btn light" onclick="changeStock('${p.id}',-1)">-1 шт</button>
          <button class="btn light" onclick="toggleProduct('${p.id}',${p.active!==false})">
            ${p.active===false ? "Показати" : "Приховати"}
          </button>
          <button class="btn red" onclick="deleteProduct('${p.id}')">Видалити</button>
        </div>
      </div>
    </div>
  `).join("");
}

async function changeStock(id,delta){
  const current=Number(products[id]?.stock||0);
  await productsRef.child(id).update({stock:Math.max(0,current+delta)});
}

async function toggleProduct(id,isActive){
  await productsRef.child(id).update({active:!isActive});
}

async function deleteProduct(id){
  if(!confirm("Видалити товар?"))return;
  await productsRef.child(id).remove();
}

function renderOrders(){
  const arr=Object.values(orders).sort((a,b)=>{
    return String(b.createdAt||"").localeCompare(String(a.createdAt||""));
  });

  if(!arr.length){
    ordersList.innerHTML=`<div class="item">Замовлень поки немає</div>`;
    return;
  }

  ordersList.innerHTML=arr.map(order=>{
    const productsText=(order.items||[]).map(item=>{
      return `• ${item.title} — ${item.qty} × ${item.price} грн`;
    }).join("<br>");

    return `
      <div class="item">
        <b>${order.firstName||""} ${order.lastName||""}</b>

        <small>
          Телефон: ${order.phone||""}<br>
          Telegram/Viber: ${order.messenger||"Не вказано"}<br>
          Куди: ${order.city||""}<br>
          Нова Пошта: ${order.novaPost||""}<br>
          Оплата: ${order.payment||""}<br>
          Сума: ${order.total||0} грн
        </small>

        <span class="status">${order.status||"Нове замовлення"}</span>

        <div class="order-products">${productsText}</div>

        <div class="actions">
          <button class="btn" onclick="approvePayment('${order.id}')">Оплату отримано</button>
          <button class="btn" onclick="approveShipping('${order.id}')">Одобрити відправку</button>
          <button class="btn light" onclick="markShipped('${order.id}')">Відправлено</button>
          <button class="btn red" onclick="cancelOrder('${order.id}')">Скасувати</button>
          <button class="btn red" onclick="deleteOrder('${order.id}')">Видалити</button>
        </div>
      </div>
    `;
  }).join("");
}

async function approvePayment(id){
  await ordersRef.child(id).update({
    paymentConfirmed:true,
    paymentStatus:"Оплату отримано",
    status:"Оплату отримано",
    customerMessage:"Оплату отримано. Замовлення очікує одобрення відправки.",
    updatedAt:new Date().toISOString()
  });
}

async function approveShipping(id){
  await ordersRef.child(id).update({
    adminConfirmed:true,
    status:"Адміністратор одобрив відправку",
    customerMessage:"Адміністратор одобрив відправку. Ваше замовлення готується до відправлення.",
    updatedAt:new Date().toISOString()
  });
}

async function markShipped(id){
  await ordersRef.child(id).update({
    shipped:true,
    status:"Відправлено",
    customerMessage:"Ваше замовлення відправлено Новою Поштою.",
    updatedAt:new Date().toISOString()
  });
}

async function cancelOrder(id){
  if(!confirm("Скасувати замовлення?"))return;

  await ordersRef.child(id).update({
    cancelled:true,
    status:"Скасовано",
    customerMessage:"Замовлення скасовано адміністратором.",
    updatedAt:new Date().toISOString()
  });
}

async function deleteOrder(id){
  if(!confirm("Повністю видалити замовлення?"))return;
  await ordersRef.child(id).remove();
}
</script>
</body>
</html>
